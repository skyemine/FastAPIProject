<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#ffffff" />
  <title>Prism</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="glow-background" aria-hidden="true">
    <div class="glow-orb blue"></div>
    <div class="glow-orb green"></div>
  </div>

  <div class="auth-shell" id="auth-shell">
    <div class="auth-card">
      <header class="topbar">
        <div class="brand">Prism</div>
        <button class="topbtn" id="theme-btn" type="button">Theme</button>
      </header>

      <div class="auth-tabs" role="tablist" aria-label="Authentication">
        <button class="tab active" id="tab-login" role="tab" aria-selected="true" type="button">Login</button>
        <button class="tab" id="tab-register" role="tab" aria-selected="false" type="button">Register</button>
      </div>

      <form class="auth-form active" id="login-form" autocomplete="on">
        <label class="field">
          <span>Username</span>
          <input name="username" required autocomplete="username" autocapitalize="none" spellcheck="false" />
        </label>

        <label class="field">
          <span>Password</span>
          <input name="password" type="password" required autocomplete="current-password" />
        </label>

        <button class="primary" type="submit">Open chats</button>
      </form>

      <form class="auth-form" id="register-form" autocomplete="on">
        <label class="field">
          <span>Username</span>
          <input name="username" required autocomplete="username" autocapitalize="none" spellcheck="false" />
        </label>

        <label class="field">
          <span>Name</span>
          <input name="display_name" autocomplete="name" />
        </label>

        <label class="field">
          <span>Password</span>
          <input name="password" type="password" required autocomplete="new-password" />
        </label>

        <button class="primary" type="submit">Create account</button>
      </form>

      <p class="auth-error" id="auth-error" aria-live="polite"></p>
    </div>
  </div>

  <button class="fab-menu hidden" id="sidebar-toggle" aria-label="Menu" aria-expanded="false" type="button">
    <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <line x1="3" y1="6" x2="21" y2="6" stroke-width="2" stroke-linecap="round"></line>
      <line x1="3" y1="12" x2="21" y2="12" stroke-width="2" stroke-linecap="round"></line>
      <line x1="3" y1="18" x2="21" y2="18" stroke-width="2" stroke-linecap="round"></line>
    </svg>
  </button>

  <div class="app-shell hidden" id="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Sidebar">
      <header class="sidebar-top">
        <div class="brand sidebar-brand-center">Prism</div>
        <div class="side-actions">
          <button class="topbtn" id="theme-btn-app" type="button">Theme</button>
          <button class="topbtn" id="sidebar-close" type="button" aria-label="Close">x</button>
        </div>
      </header>

      <section class="me">
        <div class="avatar avatar-button" id="user-avatar">?</div>
        <input id="avatar-input" type="file" accept="image/png,image/jpeg,image/webp,image/gif" hidden />
        <div class="me-meta">
          <div class="me-name" id="user-name">Guest</div>
          <div class="me-handle fade-text" id="user-handle">@guest</div>
        </div>
        <div class="me-actions">
          <button class="topbtn" id="account-btn" type="button">Account</button>
          <button class="topbtn" id="avatar-btn" type="button">Avatar</button>
          <button class="topbtn" id="logout-btn" type="button">Logout</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title">Add friend</div>
        <form class="pill" id="friend-form" autocomplete="off">
          <input id="friend-username" placeholder="username" autocapitalize="none" spellcheck="false" />
          <button class="pill-btn" type="submit" aria-label="Add">+</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-title">Requests</div>
        <div class="list" id="requests-list"></div>
      </section>

      <section class="panel grow-panel">
        <div class="panel-title">Friends</div>
        <div class="list" id="friends-list"></div>
      </section>
    </aside>

    <main class="chat">
      <header class="chat-top">
        <div class="chat-person">
          <div class="avatar" id="chat-avatar">DM</div>
          <div class="chat-meta">
            <div class="chat-title" id="chat-title">Select a friend</div>
            <div class="chat-sub fade-text" id="chat-subtitle">Accept a request or choose a friend from the list.</div>
          </div>
        </div>
        <div class="chat-right">
          <span class="status" id="chat-status">Offline</span>
        </div>
      </header>

      <section class="messages-area" id="message-stream" aria-live="polite"></section>

      <footer class="input-area">
        <form class="input-wrapper" id="composer-form" autocomplete="off">
          <input id="file-input" type="file" hidden />
          <button class="send-btn secondary" id="file-btn" type="button" disabled aria-label="Send file">+</button>
          <textarea id="composer-input" rows="1" maxlength="2000" placeholder="Message..." disabled></textarea>
          <button class="send-btn" id="send-btn" type="submit" disabled aria-label="Send">
            <svg class="send-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h14M12 5l7 7-7 7"></path>
            </svg>
          </button>
        </form>
        <div class="status-line" id="status-line">No chat selected</div>
      </footer>
    </main>
  </div>

  <dialog class="viewer" id="viewer-modal">
    <div class="viewer-card">
      <header class="topbar viewer-topbar">
        <div>
          <div class="brand" id="viewer-title">File</div>
          <div class="viewer-meta" id="viewer-meta"></div>
        </div>
        <div class="side-actions">
          <a class="topbtn" id="viewer-download" href="#" target="_blank" rel="noreferrer">Open</a>
          <button class="topbtn" id="viewer-close" type="button">x</button>
        </div>
      </header>
      <div class="viewer-body" id="viewer-body"></div>
    </div>
  </dialog>

  <dialog class="viewer" id="account-modal">
    <div class="viewer-card">
      <header class="topbar viewer-topbar">
        <div>
          <div class="brand">Account</div>
          <div class="viewer-meta">Update username, display name, and password</div>
        </div>
        <div class="side-actions">
          <button class="topbtn" id="account-close" type="button">x</button>
        </div>
      </header>
      <form class="auth-form active" id="account-form" autocomplete="on">
        <div class="account-info-grid">
          <div class="account-info-card">
            <span class="account-info-label">User ID</span>
            <strong class="account-info-value fade-text" id="account-user-id">-</strong>
          </div>
          <div class="account-info-card">
            <span class="account-info-label">Joined</span>
            <strong class="account-info-value fade-text" id="account-created-at">-</strong>
          </div>
          <div class="account-info-card">
            <span class="account-info-label">Host</span>
            <strong class="account-info-value fade-text" id="account-host">-</strong>
          </div>
          <div class="account-info-card">
            <span class="account-info-label">Notifications</span>
            <strong class="account-info-value fade-text" id="account-notifications">-</strong>
          </div>
        </div>
        <label class="field">
          <span>Username</span>
          <input id="account-username" name="username" autocomplete="username" autocapitalize="none" spellcheck="false" />
        </label>
        <label class="field">
          <span>Name</span>
          <input id="account-display-name" name="display_name" autocomplete="name" />
        </label>
        <label class="field">
          <span>Current password</span>
          <input id="account-current-password" name="current_password" type="password" autocomplete="current-password" />
        </label>
        <label class="field">
          <span>New password</span>
          <input id="account-new-password" name="new_password" type="password" autocomplete="new-password" />
        </label>
        <button class="topbtn" id="toggle-password-btn" type="button">Show password</button>
        <button class="primary" type="submit">Save</button>
      </form>
    </div>
  </dialog>

  <audio id="remote-audio" autoplay playsinline></audio>

  <script src="/assets/app.js" defer></script>
</body>
</html>
