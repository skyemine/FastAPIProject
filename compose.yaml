services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://pulsechat:pulsechat@db:5432/pulsechat
      SECRET_KEY: change-this-before-public-deploy
      ALLOWED_HOSTS: localhost,127.0.0.1
      COOKIE_SECURE: "false"
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pulsechat
      POSTGRES_USER: pulsechat
      POSTGRES_PASSWORD: pulsechat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
